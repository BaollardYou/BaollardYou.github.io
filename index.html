---
layout: home
---

<div class="home-header">
  <h1>📚 技术博客</h1>
  <p>记录学习 / 架构 / 实战</p>
</div>

<div class="post-grid">
  {% for post in paginator.posts %}
    <div class="post-card">
      <a href="{{ post.url }}">
        <h2>{{ post.title }}</h2>
        <p>{{ post.excerpt | strip_html | truncate: 100 }}</p>
        <div class="tags">
          {% for tag in post.tags %}
            <span>#{{ tag }}</span>
          {% endfor %}
        </div>
      </a>
    </div>
  {% endfor %}
</div>
