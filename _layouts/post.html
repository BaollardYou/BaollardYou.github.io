---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  <p>📅 {{ page.date }}</p>

  {% if page.categories %}
    <p>📂 分类: {{ page.categories | join: ", " }}</p>
  {% endif %}

  {% if page.tags %}
    <p>🏷️ 标签: {{ page.tags | join: ", " }}</p>
  {% endif %}

  <hr>

  <div>
    {{ content }}
  </div>
</article>
